<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Advanced To-Do List</title>
    <link rel="stylesheet" href="style.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.2/css/all.min.css">
</head>
<body>

    <div class="container">
        <div class="to-do-app">
            <div class="header-row">
                <h1>Todo App</h1>
                <button id="theme-btn"><i class="fa-solid fa-moon"></i></button>
            </div>

            <div class="stat-container">
                <div class="details">
                    <h3>Keep it up!</h3>
                    <div class="progress-bar">
                        <div id="progress" class="progress"></div>
                    </div>
                </div>
                <div class="numbers">
                    <p id="numbers">0 / 0</p>
                </div>
            </div>

            <form id="todo-form">
                <div class="input-area">
                    <input type="text" id="task-input" placeholder="What needs to be done?" autocomplete="off" required>
                    <button type="submit" id="add-task-button"><i class="fa-solid fa-plus"></i></button>
                </div>
                
                <div class="extra-inputs">
                    <input type="text" id="task-desc" placeholder="Add a description...">
                    <div class="row">
                        <input type="date" id="task-date">
                        <select id="task-priority">
                            <option value="Low">Low Priority</option>
                            <option value="Medium">Medium Priority</option>
                            <option value="High">High Priority</option>
                        </select>
                    </div>
                </div>
            </form>
<div class="filter-controls">
    <input type="text" id="search-bar" placeholder="Search tasks..." autocomplete="off">
    <select id="filter-category">
    <option value="all">All Tasks</option>
    <option value="active">Incomplete</option>
    <option value="completed">Completed</option>
    <option value="High">High Priority Only</option>
    <option value="Medium">Medium Priority Only</option>
    <option value="Low">Low Priority Only</option>
</select>
</div>
            <div class="todos-container">
                <ul id="task-list"></ul>
                <img src="Images/empty.png" id="empty-image" class="empty-image" alt="No tasks">
            </div>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/canvas-confetti@1.6.0/dist/confetti.browser.min.js"></script>
    <script src="script.js"></script>
</body>
</html>
